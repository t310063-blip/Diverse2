<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多元表現 - 清新手帳風</title>
    <!-- 引入思源宋體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: oklch(0.98 0.005 85);
        }
        .serif-font {
            font-family: 'Noto Serif TC', serif;
        }
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .journal-card {
            background: white;
            border: 1px solid #e0d5c7;
            border-radius: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 200ms ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 500ms cubic-bezier(0.23, 1, 0.32, 1) both;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Alpine.js 全域狀態中心 -->
    <div x-data="{
        activeCategory: 'clubs',
        categories: {
            'clubs': {
                title: '社團經歷',
                icon: '🎭',
                description: '在團隊合作中學習領導與溝通，從舞台排練到活動策劃，發掘課本之外的無限潛能。',
                accentColor: '#a37081',
                tagBg: 'bg-rose-50',
                tagText: 'text-rose-700',
                items: [
                    {
                        title: '校園英文戲劇社',
                        role: '社長',
                        period: '113學年度 全學年',
                        description: '負責規畫每週社課內容、協調校內外公演事務，並帶領 40 位社員完成年度成果發表，同時擔任大型英文話劇的副導演與主編劇。',
                        achievement: '成功爭取校方與家長會補助，並在全校公演中吸引超過 300 位師生進場觀賞，創下社團近年最高得票紀錄。',
                        reflection: '擔任社長讓我學到最深的不是戲劇本身，而是團隊溝通。當演員與道具組發生摩擦時，如何保持冷靜、傾聽雙方需求並找出折衷方案，這讓我實質體會到領導力的本質。',
                        tags: ['社團領導', '活動企劃', '跨部門溝通', '英文話劇']
                    }
                ]
            },
            'awards': {
                title: '競賽獲獎',
                icon: '🏆',
                description: '挑戰各類學科與才藝競賽，在壓力和專業評審前證明自己的努力成果。',
                accentColor: '#bd6b44',
                tagBg: 'bg-orange-50',
                tagText: 'text-orange-700',
                items: [
                    {
                        title: '全國高級中等學校英文話劇比賽',
                        award: '全國第三名',
                        level: '全國',
                        year: '2025年',
                        organizer: '教育部國民及學前教育署',
                        description: '代表學校參加全國決賽，將經典文學進行現代化改編。在為期半年的高強度排練中，負責全英文台詞的修飾與舞台走位設計。',
                        achievement: '於全國 20 支決賽隊伍中脫穎而出，斬獲團體第三名佳績，個人亦獲得最佳舞台設計提名。',
                        reflection: '高強度的競賽環境極度考驗抗壓性。賽前一週主角突然感冒，全隊在焦慮中互相激勵、臨時調整走位。這次經驗讓我明白，完美的背後是無數次的應變準備。',
                        tags: ['英文競賽', '舞台展現', '抗壓能力']
                    },
                    {
                        title: 'AMC 10 美國數學競賽',
                        award: 'AIME 晉級資格',
                        level: '國際',
                        year: '2025年',
                        organizer: '美國數學協會 (MAA)',
                        description: '挑戰國際化的高難度數學思維測驗，題型涵蓋高階幾何、數論及組合計數，極度考驗邏輯推導與解題速度。',
                        achievement: '分數達到全球前 2.5% 優異表現，成功取得美國數學邀請賽 (AIME) 的參賽資格。',
                        reflection: '競賽題目的靈活性讓我跳脫課本死記硬背的公式。在解出難題的瞬間，那種邏輯暢通的成就感，是讓我對數學保持熱忱的關鍵。',
                        tags: ['數學競賽', '邏輯思維', '國際認證']
                    }
                ]
            },
            'service': {
                title: '服務學習',
                icon: '💚',
                description: '走出校園、走入社會，用自己的知識與雙手為需要的人帶來溫暖與改變。',
                accentColor: '#4a7c59',
                tagBg: 'bg-emerald-50',
                tagText: 'text-emerald-700',
                items: [
                    {
                        title: '遠距偏鄉弱勢學童課業輔導計畫',
                        hours: '120 小時',
                        organization: '台灣偏鄉教育關懷協會',
                        description: '固定於每週六上午，透過線上視訊系統為偏鄉國小學童進行一對一的數學與英文課業輔導，並針對學習進度落後的孩子自製彩色手繪教材。',
                        achievement: '持續服務超過一年，輔導的兩位學童在校內段考數學成績平均提升了 20 分，並建立起自主讀書的習慣。',
                        reflection: '剛開始小朋友很不耐煩、甚至不願開鏡頭。我試著把寶可夢融入數學題目中，才漸漸打開他們的心房。服務不是居高臨下的給予，而是耐心的陪伴與引導。',
                        tags: ['公益服務', '教材設計', '遠距教學', '耐心溝通']
                    }
                ]
            },
            'certificates': {
                title: '檢定與證書',
                icon: '📜',
                description: '透過客觀的標準化檢定，檢視並證明自己在專業領域上的語言與資訊能力。',
                accentColor: '#5a7a96',
                tagBg: 'bg-blue-50',
                tagText: 'text-blue-700',
                items: [
                    {
                        title: '全民英語能力分級檢定測驗 (GEPT)',
                        level: '中高級通過',
                        issuer: '財團法人語言訓練測驗中心 (LTTC)',
                        description: '通過聽、說、讀、寫四項全方位英語能力評證，具備流暢閱讀英文文獻、撰寫學術短文及參與全英文討論之實力。',
                        achievement: '一次性通過初試與複試，其中口說與寫作部分皆獲得 B+ 以上優良評級。',
                        reflection: '聽力與口說曾是我的弱點。為了通過中高級，我連續半年每天聽廣播並跟讀。這張證書是對我持之以恆練習的最佳肯定。',
                        tags: ['語言證照', '英語能力', '自我挑戰']
                    }
                ]
            },
            'others': {
                title: '其他表現',
                icon: '✨',
                description: '課外延伸的點滴累積，包含工作坊、講座參與或多元工作體驗。',
                accentColor: '#c18c5d',
                tagBg: 'bg-amber-50',
                tagText: 'text-amber-700',
                items: [
                    {
                        title: '全國高中生青年領導力寒假工作坊',
                        period: '3天2夜營隊',
                        issuer: '國立臺灣大學青年社團',
                        description: '參與公共議題思辨、設計思考（Design Thinking）實作課程，與來自全國各地的優秀高中生針對「校園垃圾減量」進行創新提案。',
                        achievement: '與小組成員共同發表『循環餐具校園租借系統』企劃案，榮獲工作坊最終發表「最佳創意提案獎」。',
                        reflection: '在短短三天內要完成一份完整提案非常緊湊。我學會了如何使用心智圖快速聚焦混亂的想法，也明白團隊中每個人扮演好不同角色的重要性。',
                        tags: ['設計思考', '青年工作坊', '公共議題', '簡報發表']
                    }
                ]
            }
        },
        
        // 輔助函式：計算特定級別的獎項數量
        countAwards(level) {
            return this.categories['awards'].items.filter(item => item.level === level).length;
        }
    }">

        <!-- 頁面標題區塊 -->
        <div class="relative overflow-hidden" style="background: linear-gradient(135deg, rgba(217, 193, 161, 0.08) 0%, rgba(90, 122, 150, 0.06) 100%); border-bottom: 1px solid #e0d5c7;">
            <div class="absolute inset-0 opacity-25 bg-cover bg-center" style="background-image: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663684940490/8YrHt53mv4UVwQefcMW6cL/activities-banner-Cp3TqDdc38yx9WvrV7up5Z.webp');"></div>
            <div class="relative container mx-auto px-4 py-8 max-w-4xl">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style="background: oklch(0.68 0.14 45 / 0.15)">
                        🌈
                    </div>
                    <div>
                        <span class="px-2 py-0.5 rounded text-xs mb-1 block w-fit" style="background: oklch(0.68 0.14 45 / 0.12); color: oklch(0.5 0.1 45)">
                            課外活動
                        </span>
                        <h1 class="text-2xl font-bold serif-font" style="color: oklch(0.25 0.01 60)">
                            多元表現紀錄
                        </h1>
                    </div>
                </div>
                <p class="text-sm mt-2 max-w-2xl" style="color: oklch(0.45 0.02 60)">
                    探索課堂之外的無限可能。這裡記錄了我在社團、服務、競賽與檢定中的成長足跡，淬鍊出帶得走的核心素養。
                </p>
            </div>
        </div>

        <!-- 分類標籤橫向捲動 -->
        <div class="sticky top-0 z-10" style="background: oklch(0.97 0.012 85 / 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid oklch(0.88 0.02 85);">
            <div class="overflow-x-auto max-w-4xl mx-auto scrollbar-none">
                <div class="flex gap-2 px-4 py-3 min-w-max">
                    <template x-for="(cat, id) in categories" :key="id">
                        <button 
                            @click="activeCategory = id"
                            class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 whitespace-nowrap"
                            :style="activeCategory === id 
                                ? { background: cat.accentColor, color: 'oklch(0.98 0.005 85)', boxShadow: `0 4px 12px ${cat.accentColor}40`, transform: 'scale(1.02)' } 
                                : { background: 'oklch(1 0.005 85)', color: 'oklch(0.45 0.02 60)', border: '1px solid oklch(0.88 0.02 85)' }"
                        >
                            <span x-text="cat.icon"></span>
                            <span x-text="cat.title"></span>
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- 內容區域 -->
        <div class="container mx-auto px-4 py-6 max-w-4xl">
            <div :key="activeCategory" class="animate-fade-in">
                
                <!-- 統計摘要（僅在「競賽獲獎」特殊顯示） -->
                <template x-if="activeCategory === 'awards'">
                    <div class="grid grid-cols-3 gap-3 mb-5">
                        <div class="journal-card p-3 text-center border-t-[3px]" style="border-top-color: oklch(0.68 0.14 45)">
                            <p class="text-2xl font-bold serif-font" style="color: oklch(0.68 0.14 45)" x-text="countAwards('全國')"></p>
                            <p class="text-xs mt-0.5 text-stone-400 font-medium">全國獎項</p>
                        </div>
                        <div class="journal-card p-3 text-center border-t-[3px]" style="border-top-color: oklch(0.55 0.12 230)">
                            <p class="text-2xl font-bold serif-font" style="color: oklch(0.55 0.12 230)" x-text="countAwards('縣市')"></p>
                            <p class="text-xs mt-0.5 text-stone-400 font-medium">縣市獎項</p>
                        </div>
                        <div class="journal-card p-3 text-center border-t-[3px]" style="border-top-color: oklch(0.42 0.12 150)">
                            <p class="text-2xl font-bold serif-font" style="color: oklch(0.42 0.12 150)" x-text="countAwards('國際')"></p>
                            <p class="text-xs mt-0.5 text-stone-400 font-medium">國際獎項</p>
                        </div>
                    </div>
                </template>

                <!-- 服務學習總時數（僅在「服務學習」特殊顯示） -->
                <template x-if="activeCategory === 'service'">
                    <div class="flex items-center gap-3 p-4 rounded-xl mb-5 border" style="background: oklch(0.52 0.1 180 / 0.08); border-color: oklch(0.52 0.1 180 / 0.2);">
                        <span class="text-2xl flex-shrink-0" style="color: oklch(0.52 0.1 180)">💚</span>
                        <div>
                            <p class="text-xs font-semibold text-stone-400">服務學習總時數</p>
                            <p class="text-2xl font-bold serif-font" style="color: oklch(0.52 0.1 180)">220 小時</p>
                        </div>
                    </div>
                </template>

                <!-- 當前分類說明 -->
                <div class="flex items-start gap-3 p-4 rounded-xl mb-5"
                     :style="{ background: `${categories[activeCategory].accentColor}0d`, border: `1px solid ${categories[activeCategory].accentColor}30` }">
                    <span class="text-2xl flex-shrink-0" x-text="categories[activeCategory].icon"></span>
                    <div>
                        <h2 class="text-lg font-bold mb-1 serif-font" style="color: oklch(0.25 0.01 60)" x-text="categories[activeCategory].title"></h2>
                        <p class="text-sm leading-relaxed" style="color: oklch(0.45 0.02 60)" x-text="categories[activeCategory].description"></p>
                    </div>
                </div>

                <!-- 項目列表區塊 -->
                <div class="space-y-4">
                    <template x-for="(item, index) in categories[activeCategory].items" :key="index">
                        <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden transition-all duration-200" style="box-shadow: 0 2px 8px rgba(0,0,0,0.04)">
                            <div class="flex" x-data="{ expanded: false }">
                                <!-- 左側裝飾條 -->
                                <div class="w-1.5 flex-shrink-0" :style="{ background: categories[activeCategory].accentColor }"></div>
                                
                                <div class="flex-1 p-5">
                                    <!-- 標題行 -->
                                    <div class="flex items-start justify-between gap-4 mb-2">
                                        <div class="flex-1">
                                            <h3 class="text-base font-bold leading-snug mb-2 serif-font" style="color: oklch(0.25 0.01 60)" x-text="item.title"></h3>
                                            
                                            <!-- 手帳貼紙風動態 Badge 標籤列 -->
                                            <div class="flex flex-wrap gap-1.5">
                                                <!-- 社團身份 -->
                                                <template x-if="item.role">
                                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium" :style="{ background: `${categories[activeCategory].accentColor}18`, color: categories[activeCategory].accentColor }">
                                                        ⭐ <span x-text="item.role"></span>
                                                    </span>
                                                </template>
                                                <!-- 時間週期 -->
                                                <template x-if="item.period">
                                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-stone-100 text-stone-500">
                                                        ⏱️ <span x-text="item.period"></span>
                                                    </span>
                                                </template>
                                                <!-- 競賽成果 -->
                                                <template x-if="item.award">
                                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium" style="background: oklch(0.72 0.14 75 / 0.15); color: oklch(0.5 0.1 75);">
                                                        🏆 <span x-text="item.award"></span>
                                                    </span>
                                                </template>
                                                <!-- 競賽層級 -->
                                                <template x-if="item.level && activeCategory === 'awards'">
                                                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold"
                                                          :style="item.level === '全國' ? { background: 'oklch(0.68 0.14 45 / 0.15)', color: 'oklch(0.5 0.1 45)' } :
                                                                  item.level === '縣市' ? { background: 'oklch(0.55 0.12 230 / 0.15)', color: 'oklch(0.35 0.1 230)' } :
                                                                  { background: 'oklch(0.42 0.12 150 / 0.15)', color: 'oklch(0.3 0.1 150)' }" x-text="item.level">
                                                    </span>
                                                </template>
                                                <!-- 競賽年份 -->
                                                <template x-if="item.year">
                                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-stone-100 text-stone-500">
                                                        📅 <span x-text="item.year"></span>
                                                    </span>
                                                </template>
                                                <!-- 服務時數 -->
                                                <template x-if="item.hours">
                                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium" style="background: oklch(0.52 0.1 180 / 0.15); color: oklch(0.4 0.1 180);">
                                                        💚 <span x-text="item.hours"></span>
                                                    </span>
                                                </template>
                                                <!-- 服務/檢定機構 -->
                                                <template x-if="item.organization || item.issuer">
                                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-stone-100 text-stone-500">
                                                        🏢 <span x-text="item.organization || item.issuer"></span>
                                                    </span>
                                                </template>
                                                <!-- 證照等級 -->
                                                <template x-if="item.level && activeCategory === 'certificates'">
                                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium" :style="{ background: `${categories[activeCategory].accentColor}18`, color: categories[activeCategory].accentColor }">
                                                        📜 <span x-text="item.level"></span>
                                                    </span>
                                                </template>
                                            </div>
                                        </div>
                                        
                                        <!-- 手風琴按鈕 -->
                                        <button @click="expanded = !expanded" 
                                                class="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
                                                :style="expanded 
                                                    ? { background: `${categories[activeCategory].accentColor}15`, color: categories[activeCategory].accentColor } 
                                                    : { background: 'oklch(0.93 0.01 85)', color: 'oklch(0.55 0.02 60)' }">
                                            <svg x-show="!expanded" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
                                            <svg x-show="expanded" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 15l-7-7-7 7"></path></svg>
                                        </button>
                                    </div>

                                    <!-- 簡短描述（收合時顯示） -->
                                    <p x-show="!expanded" class="text-sm leading-relaxed line-clamp-2 mt-2" style="color: oklch(0.45 0.02 60)" x-text="item.description"></p>

                                    <!-- 展開後的完整內容 -->
                                    <div x-show="expanded" x-transition class="mt-4 space-y-4 pt-2 border-t border-dashed border-stone-200">
                                        <div>
                                            <span class="text-xs font-semibold block mb-1 text-stone-400">經歷概述</span>
                                            <p class="text-sm leading-relaxed" style="color: oklch(0.35 0.01 60)" x-text="item.description"></p>
                                        </div>

                                        <!-- 成果與成就 -->
                                        <template x-if="item.achievement">
                                            <div class="flex items-start gap-2 p-3 rounded-lg" :style="{ background: `${categories[activeCategory].accentColor}0d` }">
                                                <span class="mt-0.5 text-sm" :style="{ color: categories[activeCategory].accentColor }">🏅</span>
                                                <div>
                                                    <span class="text-xs font-semibold block mb-0.5" :style="{ color: categories[activeCategory].accentColor }">成果與成就</span>
                                                    <p class="text-sm" style="color: oklch(0.35 0.01 60)" x-text="item.achievement"></p>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- 心得與反思 -->
                                        <template x-if="item.reflection">
                                            <div class="flex items-start gap-2 p-3 rounded-lg" style="background: oklch(0.95 0.01 85)">
                                                <span class="mt-0.5 text-sm">💭</span>
                                                <div>
                                                    <span class="text-xs font-semibold block mb-0.5" style="color: oklch(0.55 0.1 45)">心得與反思</span>
                                                    <p class="text-sm italic leading-relaxed" style="color: oklch(0.45 0.02 60)" x-text="'「 ' + item.reflection + ' 」'"></p>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- 主辦單位（若有） -->
                                        <template x-if="item.organizer">
                                            <div class="flex items-center gap-1.5 text-xs text-stone-400">
                                                <span>🏢</span>
                                                <span x-text="'主辦單位：' + item.organizer"></span>
                                            </div>
                                        </template>

                                        <!-- 貼紙風 #標籤 -->
                                        <div class="flex flex-wrap gap-1.5 pt-1">
                                            <template x-for="(tag, tIdx) in item.tags" :key="tIdx">
                                                <span class="px-2 py-0.5 rounded text-xs font-medium" :class="[categories[activeCategory].tagBg, categories[activeCategory].tagText]" x-text="'#' + tag"></span>
                                            </template>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </template>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
